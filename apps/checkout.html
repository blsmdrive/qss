<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Flint Card</title>
    <!-- Removed static meta refresh to Stripe Checkout -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="redirect-layout">
    <div class="redirect-msg">
        <div class="spinner-lg"></div>
        <h2>Taking you to <span class="text-gradient-flint">secure checkout…</span></h2>
        <p>You'll be redirected to Stripe's secure payment page momentarily.</p>
        <p style="margin-top:1.5rem; font-size:0.85rem;" id="checkout-error">
        </p>
    </div>
    <script>
        // Initiate Dynamic Checkout
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000' 
            : 'https://quiet-stack-backend.onrender.com';

        async function initCheckout() {
            try {
                const response = await fetch(`${API_URL}/api/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (response.ok && data.url) {
                    window.location.replace(data.url);
                } else {
                    throw new Error(data.error || 'Checkout initialization failed');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('checkout-error').innerHTML = 
                    `<span style="color:var(--text-secondary);">Error: We couldn't prepare your checkout at this time. Please return to the <a href="flint.html" style="color:var(--flint-color);">Flint page</a> and try again.</span>`;
                document.querySelector('.spinner-lg').style.display = 'none';
            }
        }

        window.onload = initCheckout;
    </script>
</body>

</html>
