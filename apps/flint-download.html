<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Flint | Reclaim Your Focus Instantly</title>
    <meta name="description" content="Download the Flint app to start reclaiming your focus instantly.">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* ---- Dedicated Download Page Styles ---- */
        .download-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            text-align: center;
            padding-top: 80px;
            /* Offset for nav */
            padding-bottom: 40px;
        }

        .download-hero::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle at center, rgba(245, 158, 11, 0.15) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .download-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }

        .app-icon-large {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        .download-content h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .download-content p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 320px;
        }

        .app-store-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: #000;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 0.6rem 1.25rem;
            text-decoration: none;
            transition: all var(--transition-normal);
            width: 100%;
            max-width: 240px;
        }

        .app-store-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: #111;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1;
        }

        .btn-small {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-bottom: 0.15rem;
        }

        .btn-large {
            font-size: 1.15rem;
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: -0.02em;
        }

        .footer-simple {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
    </style>
</head>

<body>

            </a>
            <div class="nav-links">

                    Card</a>
            </div>
        </div>
    </nav>

    <main class="download-hero">
        <div class="download-content reveal active">
            <img src="../assets/flint_dark_logo.png" alt="Flint Logo" class="app-icon-large">

            <h1 class="text-gradient-flint">Get Flint</h1>
            <p>Reclaim your focus instantly. Download the app to get started.</p>

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 384 512"

        </div>

        <div class="footer-simple">
            &copy; 2026 Quiet Stack Studios
        </div>
    </main>
</body>

</html>
